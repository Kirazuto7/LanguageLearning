services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"  # React Dev Server
    volumes:
      # Mounts your local frontend code into the container at /app
      - ./frontend:/app
      # This is a trick to prevent the local node_modules from overwriting
      # the one installed in the container.
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend/dockerfiles
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-credentials.json
    volumes:
      - ./backend:/app
      - ./.gcp/gcp-credentials.json:/app/gcp-credentials.json:ro
      - backend-gradle-cache:/root/.gradle
    depends_on:
      postgres:
        condition: service_healthy
      ai:
        condition: service_healthy
      ai-kr:
        condition: service_healthy
      ai-jp:
        condition: service_healthy

    healthcheck:
      # This check requires curl to be installed in the backend container.
      # It polls the Spring Boot Actuator health endpoint.
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ai-kr:
    build:
      context: ./backend/dockerfiles
      dockerfile: DockerfileKo
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu] # Optional / Can remove to use CPU
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ai-jp:
    build:
      context: ./backend/dockerfiles
      dockerfile: DockerfileJP
    ports:
      - "11435:11434"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu] # Optional / Can remove to use CPU
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ai:
    build:
      context: ./backend/dockerfiles
      dockerfile: DockerfileAI
    ports:
      - "11436:11434"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu] # Optional / Can remove to use CPU
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    env_file: .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  backend-gradle-cache:
  postgres-data: