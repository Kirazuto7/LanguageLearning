services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"  # React Dev Server
    volumes:
      # Mounts your local frontend code into the container at /app
      - ./frontend:/app
      # This is a trick to prevent the local node_modules from overwriting
      # the one installed in the container.
      - /app/node_modules
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/language_learning
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./backend:/app
      - backend-gradle-cache:/root/.gradle
    depends_on:
      - postgres

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu] # optional

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=language_learning
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  ollama-data:
  backend-gradle-cache:
  postgres-data: