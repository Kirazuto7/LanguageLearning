spring.application.name=language-learning
management.endpoints.web.exposure.include=health
# Use "validate" in production.
spring.jpa.hibernate.ddl-auto=update

#Postgres
spring.datasource.url=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Spring AI Ollama Configuration
spring.ai.ollama.chat.options.model=aya
spring.ai.ollama.base-url=http://ollama:11434
# Increase the maximum number of tokens the model can generate in a single response.
spring.ai.ollama.chat.options.num-ctx=8192
spring.ai.ollama.chat.options.num-predict=8192
spring.ai.ollama.chat.options.temperature=0.2
