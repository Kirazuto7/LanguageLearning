spring.application.name=language-learning

# Use "validate" in production.
spring.jpa.hibernate.ddl-auto=update

# Spring AI Ollama Configuration
spring.ai.ollama.chat.options.model=llama3
spring.ai.ollama.base-url=http://ollama:11434
# Increase the maximum number of tokens the model can generate in a single response.
spring.ai.ollama.chat.options.num-predict=2048
