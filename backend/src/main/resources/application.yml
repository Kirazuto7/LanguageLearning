spring:
  application:
    name: language-learning
  jpa:
    hibernate:
      #ddl-auto: create-drop # Use "validate" in production to avoid accidental data loss.
      ddl-auto: update
  datasource:
    url: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  mvc:
    async:
      request-timeout: -1
  graphql:
    path: /graphql
    websocket:
      path: /graphql
  ai:
    # Disable auto-configuration to allow for full manual bean definition.
    model:
      chat: none
      embedding: none
    ollama1:
      base-url: ${SPRING_AI_OLLAMA_BASE_URL}
      chat:
        options:
          format: json
          num-ctx: 8192
          num-predict: 8192
          temperature: 0.5

    ollama2:
      base-url: ${SPRING_AI_OLLAMA_BASE_URL}
      chat:
        options:
          format: json
          num-ctx: 8192
          num-predict: 8192
          temperature: 0.5

app:
  job-queue:
    workers: 5
  reactive-job-queue:
    workers: 10
  logging:
    path: ./logs
    max-run-history: 5

logging:
  level:
    org.springframework.security: INFO
    # This warning is expected because we define a custom AuthenticationProvider. Set to ERROR to hide it.
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: ERROR
    org.springframework.graphql: DEBUG
    org.springframework.web.socket: DEBUG
    #org.springframework.boot.actuate.health: WARN

management:
  endpoints:
    web:
      exposure:
        include: health

application:
  security:
    jwt:
      secret-key: "pdbhjA+O1PBFGHMIpW9KYnA1cNsNePgh4zaCn5EpMkA="
      expiration: 86400000
    public-paths:
      - "/api/users/register"
      - "/api/users/login"
      - "/api/users/logout"
      - "/error"
      - "/graphql"
      - "/graphiql"
