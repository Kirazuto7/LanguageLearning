services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    profiles: ["frontend"]

  backend:
    build:
      context: .
      dockerfile: ./backend/dockerfiles/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - SPRING_AI_OLLAMA_BASE_URL=${SPRING_AI_OLLAMA_BASE_URL}
      - SPRING_PROFILES_ACTIVE=dev,cpu
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/build
      - /app/.gradle
      - backend-gradle-cache:/root/.gradle
    working_dir: /app/backend
    depends_on:
      postgres:
        condition: service_healthy
      ai:
        condition: service_healthy
    healthcheck:
      # This check requires curl to be installed in the backend container.
      # It polls the Spring Boot Actuator health endpoint.
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 1m

  ai:
    build:
      context: ./backend/dockerfiles
      dockerfile: DockerfileAI
    environment:
      - AI_PROFILE=cpu
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: [ "CMD-SHELL", "test -f /root/.ollama/models_pulled.marker && ollama list > /dev/null" ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15m

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    env_file: .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  backend-gradle-cache:
  postgres-data:
  ollama-data: